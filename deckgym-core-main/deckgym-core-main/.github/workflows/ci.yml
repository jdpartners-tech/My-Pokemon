name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build artifacts
        run: cargo build --features "tui test-utils" --all-targets

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --features "tui test-utils" -- -D warnings

      - name: Run tests
        run: cargo test --features "tui test-utils" --all-targets

      - name: Run example 1
        run: cargo run simulate example_decks/venusaur-exeggutor.txt example_decks/weezing-arbok.txt --num 10 -v

      - name: Run example 2
        run: cargo run simulate example_decks/venusaur-exeggutor.txt example_decks/weezing-arbok.txt --num 1 --players r,r -vv

      - name: Run example 3
        run: cargo run optimize example_decks/incomplete-chari.txt A2147,A2148 example_decks/ --num 1 --players r,r -v

      - name: Run example 4
        run: cargo run simulate example_decks/venusaur-exeggutor.txt example_decks/ --num 500

      - name: Generate card_ids.rs
        run: cargo run --bin card_enum_generator > tmp.rs && mv tmp.rs src/card_ids.rs && cargo fmt

      - name: Generate database.rs
        run: cargo run --bin card_enum_generator -- --database > tmp.rs && mv tmp.rs src/database.rs && cargo fmt
